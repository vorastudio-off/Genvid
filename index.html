<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GenVid – Create Viral Videos with AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00e5ff;
      --purple: #a855f7;
      --pink:   #ec4899;
      --blue:   #3b82f6;
      --bg:     #060614;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }

    /* ─── NOISE GRAIN OVERLAY ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ─── RADIAL GLOW BG ─── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 10%, rgba(0,229,255,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 15% 55%, rgba(168,85,247,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 45% 55% at 85% 45%, rgba(59,130,246,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 35% 40% at 60% 80%, rgba(236,72,153,0.08) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ─── ANIMATED PARTICLES ─── */
    .particles {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* ─── PAGE WRAPPER ─── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 24px 60px;
    }

    /* ─── LOGO ─── */
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: clamp(48px, 8vw, 80px);
      animation: fadeDown 0.8s ease both;
    }
    .logo span.gen { color: var(--cyan); }
    .logo span.vid { color: #fff; }

    /* ─── FLOATING VIDEO CARDS (decorative) ─── */
    .scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* Left cluster */
    .card {
      position: absolute;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatCard ease-in-out infinite;
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0px) rotate(var(--rot, 0deg)); }
      50%       { transform: translateY(-14px) rotate(var(--rot, 0deg)); }
    }

    /* Video thumbnails */
    .card.vid-thumb {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .card .play-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .card .play-btn::after {
      content: '';
      border-left: 10px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 3px;
    }

    /* Label chips */
    .chip {
      position: absolute;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.72rem;
      font-family: 'DM Sans', sans-serif;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 7px;
      animation: floatCard ease-in-out infinite;
    }

    /* Hex / node graphic */
    .hex-graphic {
      position: absolute;
      left: 3%;
      top: 22%;
      width: clamp(130px, 18vw, 220px);
      animation: floatCard 5s ease-in-out infinite;
      --rot: -3deg;
    }

    /* Brain chip graphic */
    .brain-wrap {
      position: absolute;
      right: 4%;
      top: 28%;
      width: clamp(110px, 14vw, 180px);
      animation: floatCard 6s ease-in-out infinite 1s;
    }

    /* ─── HERO TEXT ─── */
    .hero {
      text-align: center;
      margin-top: clamp(10px, 6vw, 60px);
      animation: fadeUp 0.9s 0.2s ease both;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      background: linear-gradient(160deg, #ffffff 0%, rgba(255,255,255,0.75) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 820px;
    }
    .hero h1 .ai-word {
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      margin-top: 18px;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ─── EMAIL FORM ─── */
    .email-form {
      margin-top: clamp(24px, 4vw, 40px);
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 50px;
      padding: 5px 5px 5px 18px;
      align-items: center;
      animation: fadeUp 0.9s 0.4s ease both;
      box-shadow: 0 0 40px rgba(0,229,255,0.07);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .email-form:focus-within {
      box-shadow: 0 0 60px rgba(0,229,255,0.15);
      border-color: rgba(0,229,255,0.6);
    }
    .email-form input {
      flex: 1;
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
    }
    .email-form input::placeholder { color: rgba(255,255,255,0.35); }
    .email-form button {
      flex-shrink: 0;
      padding: 10px 18px;
      border-radius: 44px;
      border: none;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      line-height: 1;
    }
    .email-form button:hover { opacity: 0.85; transform: scale(0.97); }
    .email-form button:active { transform: scale(0.95); }

    /* Mobile: stack form vertically */
    @media (max-width: 480px) {
      .email-form {
        flex-direction: column;
        border-radius: 18px;
        padding: 14px 16px;
        gap: 12px;
        align-items: stretch;
        max-width: 100%;
      }
      .email-form input {
        font-size: 1rem;
        text-align: center;
      }
      .email-form button {
        padding: 13px 20px;
        font-size: 0.9rem;
        border-radius: 12px;
        width: 100%;
      }
    }

    .launching {
      margin-top: 14px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeUp 0.9s 0.55s ease both;
    }

    /* ─── BOTTOM VIDEO STRIP ─── */
    .video-strip {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin-top: clamp(36px, 7vw, 64px);
      animation: fadeUp 1s 0.6s ease both;
    }

    /* Waveform + center play */
    .waveform-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 48px;
    }
    .waveform .bar {
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--pink), var(--purple));
      animation: pulse var(--dur, 0.8s) ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: scaleY(0.2); }
      to   { transform: scaleY(1); }
    }

    .center-play {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 30px rgba(0,229,255,0.35);
    }
    .center-play::after {
      content: '';
      border-left: 18px solid #fff;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 4px;
    }

    /* Thumbnail cards in strip */
    .strip-cards {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .strip-card {
      border-radius: 16px;
      background: linear-gradient(135deg, #1c1c3a, #0f1129);
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .strip-card.sm { width: 100px; height: 72px; }
    .strip-card.md { width: 130px; height: 92px; }
    .strip-card .play-sm {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .strip-card .play-sm::after {
      content: '';
      border-left: 8px solid #fff;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      margin-left: 2px;
    }
    /* subtle gradient fill for thumbnails */
    .strip-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--thumb-grad, linear-gradient(135deg, #1a1340 0%, #0d1b40 100%));
      z-index: 0;
    }
    .strip-card .play-sm { position: relative; z-index: 1; }

    /* Progress bar */
    .progress-bar-wrap {
      margin-top: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
    }
    .pb-play {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pb-play::after {
      content: '';
      border-left: 7px solid #fff;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      margin-left: 2px;
    }
    .pb-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      position: relative;
    }
    .pb-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      border-radius: 2px;
    }
    .pb-thumb {
      position: absolute;
      top: 50%;
      left: 45%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
    }

    /* ─── SVG INLINE GRAPHICS ─── */
    svg.hex { width: 100%; height: auto; }
    svg.brain-chip { width: 100%; height: auto; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .hex-graphic, .brain-wrap,
      .scene .card, .scene .chip { display: none; }
    }
  </style>
</head>
<body>

<!-- BG Effects -->
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<!-- Decorative scene -->
<div class="scene">

  <!-- Hex network graphic, left -->
  <div class="hex-graphic">
    <svg class="hex" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
        </radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Outer ring nodes -->
      <circle cx="110" cy="30"  r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>
      <circle cx="190" cy="75"  r="5" fill="#a855f7" filter="url(#glow)" opacity="0.8"/>
      <circle cx="190" cy="145" r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.8"/>
      <circle cx="110" cy="190" r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>
      <circle cx="30"  cy="145" r="5" fill="#a855f7" filter="url(#glow)" opacity="0.8"/>
      <circle cx="30"  cy="75"  r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.8"/>
      <!-- Inner nodes -->
      <circle cx="110" cy="75"  r="5" fill="#ec4899" filter="url(#glow)" opacity="0.9"/>
      <circle cx="150" cy="110" r="4" fill="#00e5ff" filter="url(#glow)" opacity="0.7"/>
      <circle cx="110" cy="145" r="5" fill="#a855f7" filter="url(#glow)" opacity="0.8"/>
      <circle cx="70"  cy="110" r="4" fill="#3b82f6" filter="url(#glow)" opacity="0.7"/>
      <!-- Center -->
      <circle cx="110" cy="110" r="18" fill="url(#hg)" stroke="#00e5ff" stroke-width="1" opacity="0.9"/>
      <circle cx="110" cy="110" r="8"  fill="#00e5ff" opacity="0.9" filter="url(#glow)"/>
      <!-- Lines outer -->
      <line x1="110" y1="30"  x2="190" y2="75"  stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
      <line x1="190" y1="75"  x2="190" y2="145" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
      <line x1="190" y1="145" x2="110" y2="190" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
      <line x1="110" y1="190" x2="30"  y2="145" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
      <line x1="30"  y1="145" x2="30"  y2="75"  stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
      <line x1="30"  y1="75"  x2="110" y2="30"  stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
      <!-- Lines inner -->
      <line x1="110" y1="30"  x2="110" y2="75"  stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
      <line x1="190" y1="75"  x2="150" y2="110" stroke="#a855f7" stroke-width="0.6" opacity="0.3"/>
      <line x1="190" y1="145" x2="150" y2="110" stroke="#3b82f6" stroke-width="0.6" opacity="0.3"/>
      <line x1="110" y1="190" x2="110" y2="145" stroke="#ec4899" stroke-width="0.6" opacity="0.3"/>
      <line x1="30"  y1="145" x2="70"  y2="110" stroke="#a855f7" stroke-width="0.6" opacity="0.3"/>
      <line x1="30"  y1="75"  x2="70"  y2="110" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
      <line x1="110" y1="75"  x2="150" y2="110" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
      <line x1="150" y1="110" x2="110" y2="145" stroke="#a855f7" stroke-width="0.6" opacity="0.3"/>
      <line x1="110" y1="145" x2="70"  y2="110" stroke="#3b82f6" stroke-width="0.6" opacity="0.3"/>
      <line x1="70"  y1="110" x2="110" y2="75"  stroke="#ec4899" stroke-width="0.6" opacity="0.3"/>
      <!-- Center connections -->
      <line x1="110" y1="75"  x2="110" y2="110" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
      <line x1="150" y1="110" x2="110" y2="110" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
      <line x1="110" y1="145" x2="110" y2="110" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
      <line x1="70"  y1="110" x2="110" y2="110" stroke="#ec4899" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>

  <!-- Small floating cards left -->
  <div class="card vid-thumb" style="width:170px;height:110px;left:8%;top:42%;--rot:-4deg;animation-duration:5.5s;animation-delay:0s;">
    <div class="play-btn"></div>
  </div>
  <div class="card vid-thumb" style="width:100px;height:70px;left:3%;top:62%;--rot:3deg;animation-duration:4.5s;animation-delay:0.8s;">
    <div class="play-btn" style="width:22px;height:22px;"></div>
  </div>

  <!-- Label chips left -->
  <div class="chip" style="left:3%;top:35%;animation-duration:5s;animation-delay:0.3s;">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect width="13" height="13" rx="3" fill="#00e5ff" opacity="0.3"/><rect x="2" y="5" width="9" height="1.5" rx="0.75" fill="#00e5ff"/><rect x="2" y="8" width="6" height="1.5" rx="0.75" fill="#00e5ff"/><rect x="2" y="2" width="7" height="1.5" rx="0.75" fill="#00e5ff"/></svg>
    Text captions
  </div>
  <div class="chip" style="left:14%;top:76%;animation-duration:6s;animation-delay:1s;">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#a855f7" stroke-width="1.2"/><path d="M4 6l1.5 1.5L8 4.5" stroke="#a855f7" stroke-width="1.2" stroke-linecap="round"/></svg>
    Your video was th...
  </div>

  <!-- Waveform chip -->
  <div style="position:absolute;left:2%;top:68%;animation:floatCard 4.8s ease-in-out infinite 0.5s;" class="chip">
    <svg width="52" height="16" viewBox="0 0 52 16"><g>
      <rect x="0"  y="6" width="3" height="4"  rx="1.5" fill="#a855f7"/>
      <rect x="5"  y="3" width="3" height="10" rx="1.5" fill="#ec4899"/>
      <rect x="10" y="0" width="3" height="16" rx="1.5" fill="#a855f7"/>
      <rect x="15" y="4" width="3" height="8"  rx="1.5" fill="#3b82f6"/>
      <rect x="20" y="2" width="3" height="12" rx="1.5" fill="#00e5ff"/>
      <rect x="25" y="5" width="3" height="6"  rx="1.5" fill="#ec4899"/>
      <rect x="30" y="1" width="3" height="14" rx="1.5" fill="#a855f7"/>
      <rect x="35" y="4" width="3" height="8"  rx="1.5" fill="#3b82f6"/>
      <rect x="40" y="2" width="3" height="12" rx="1.5" fill="#00e5ff"/>
      <rect x="45" y="6" width="3" height="4"  rx="1.5" fill="#ec4899"/>
      <rect x="50" y="3" width="3" height="10" rx="1.5" fill="#a855f7"/>
    </g></svg>
  </div>

  <!-- Brain chip right -->
  <div class="brain-wrap">
    <svg class="brain-chip" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="br" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#060614" stop-opacity="0"/>
        </radialGradient>
        <filter id="bg"><feGaussianBlur stdDeviation="5"/></filter>
      </defs>
      <!-- Glow bg -->
      <circle cx="90" cy="90" r="75" fill="url(#br)"/>
      <!-- Chip body -->
      <rect x="42" y="42" width="96" height="96" rx="16" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Circuit lines left -->
      <line x1="42" y1="65" x2="20" y2="65" stroke="#3b82f6" stroke-width="1.2" opacity="0.6"/>
      <circle cx="20" cy="65" r="3" fill="#3b82f6" opacity="0.8"/>

<div class="page">

  <div class="logo"><span class="gen">Gen</span><span class="vid">Vid</span></div>

  <div class="hero">
    <h1>Create Viral Videos with <span class="ai-word">AI</span></h1>
    <p>Script. Voice. Visuals. Done in Seconds.</p>
  </div>

  <div class="email-form">
    <input type="email" placeholder="Premium email" id="emailInput" />
    <button onclick="handleSubmit()">Get Early Access</button>
  </div>

  <p class="launching">Launching Soon</p>

  <!-- Bottom media strip -->
  <div class="video-strip">
    <div class="strip-cards">
      <div class="strip-card sm" style="--thumb-grad:linear-gradient(135deg,#1a1340,#0d1b40);">
        <div class="play-sm"></div>
      </div>
      <div class="strip-card md" style="--thumb-grad:linear-gradient(135deg,#1c1135,#0b1535);">
        <div class="play-sm"></div>
      </div>
    </div>

    <div class="waveform-row">
      <!-- Left waveform -->
      <div class="waveform" id="wl"></div>
      <!-- Center play -->
      <div class="center-play"></div>
      <!-- Right waveform -->
      <div class="waveform" id="wr"></div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-wrap">
      <div class="pb-play"></div>
      <div class="pb-track">
        <div class="pb-fill"></div>
        <div class="pb-thumb"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Generate waveform bars ──
  function buildWave(id, count) {
    const el = document.getElementById(id);
    const heights = [0.3,0.5,0.8,0.6,1,0.7,0.9,0.5,0.4,0.7,1,0.6,0.8,0.4,0.5,0.9,0.3,0.7,0.6,0.8];
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'bar';
      const h = (heights[i % heights.length] * 44);
      b.style.height = h + 'px';
      b.style.setProperty('--dur', (0.5 + Math.random() * 0.6) + 's');
      b.style.animationDelay = (i * 0.06) + 's';
      el.appendChild(b);
    }
  }
  buildWave('wl', 18);
  buildWave('wr', 18);

  // ── Particles ──
  const container = document.getElementById('particles');
  const colors = ['#00e5ff','#a855f7','#3b82f6','#ec4899'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      opacity:${0.3+Math.random()*0.5};
      animation-duration:${8+Math.random()*14}s;
      animation-delay:${-Math.random()*14}s;
      filter:blur(${Math.random()*1}px);
      box-shadow:0 0 6px currentColor;
    `;
    container.appendChild(p);
  }

  // ── Form submission ──
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      input.style.color = '#ef4444';
      input.placeholder = 'Enter a valid email';
      setTimeout(() => { input.style.color = '#fff'; input.placeholder = 'Premium email'; }, 2000);
      return;
    }
    const btn = document.querySelector('.email-form button');
    btn.textContent = '✓ You\'re on the list!';
    btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
    input.value = '';
    input.placeholder = 'Thanks! We\'ll be in touch.';
    input.disabled = true;
  }

  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
